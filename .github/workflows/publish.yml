name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Job 1: Publish all three packages to NuGet ──────────────────────────────
  publish-nuget:
    name: NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: |
          dotnet pack CosmoBroker.csproj -c Release -o out
          dotnet pack CosmoBroker.Client/CosmoBroker.Client.csproj -c Release -o out
          dotnet pack CosmoBroker.Server/CosmoBroker.Server.csproj -c Release -o out

      - name: Push to NuGet
        run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # ── Job 2: Build and push CosmoBroker.Server Docker image to Docker Hub ─────
  publish-docker:
    name: Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Extract the semver tag (v1.1.5 → 1.1.5) for the image tag.
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build for both linux/amd64 and linux/arm64 in one push.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CosmoBroker.Server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker:latest
          # Layer cache persisted across runs — speeds up repeated builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
