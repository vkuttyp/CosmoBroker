name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore and build
        run: |
          dotnet restore CosmoBroker.csproj
          dotnet restore CosmoBroker.Client.Tests/CosmoBroker.Client.Tests.csproj
          dotnet restore CosmoBroker.Server/CosmoBroker.Server.csproj
          dotnet restore CosmoBroker.Benchmarks/CosmoBroker.Benchmarks.csproj
          dotnet restore Test/Tests.csproj
          dotnet build CosmoBroker.csproj -c Release --no-restore
          dotnet build CosmoBroker.Client.Tests/CosmoBroker.Client.Tests.csproj -c Release --no-restore
          dotnet build CosmoBroker.Server/CosmoBroker.Server.csproj -c Release --no-restore
          dotnet build CosmoBroker.Benchmarks/CosmoBroker.Benchmarks.csproj -c Release --no-restore
          dotnet build Test/Tests.csproj -c Release --no-restore

      - name: Run core tests
        run: dotnet test Test/Tests.csproj --no-build -c Release --logger "console;verbosity=normal" --blame-hang-timeout 30s

      - name: Run RabbitMQ and AMQP release tests
        run: |
          dotnet test CosmoBroker.Client.Tests/CosmoBroker.Client.Tests.csproj --no-build -c Release --filter "FullyQualifiedName~AmqpInteropTests|FullyQualifiedName~AmqpAuthInteropTests|FullyQualifiedName~RabbitMQPersistenceTests|FullyQualifiedName~RabbitMQVhostAuthTests" --logger "console;verbosity=normal" --blame-hang-timeout 30s

      - name: Run AMQP comparison
        env:
          COUNT: 1000
          PAYLOAD: 128
          LATENCY: 100
          TIMEOUT_MS: 3000
        run: bash benchmarks/compare_amqp.sh

  # ── Job 1: Publish all three packages to NuGet ──────────────────────────────
  publish-nuget:
    name: NuGet
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: |
          dotnet pack CosmoBroker.csproj -c Release -o out
          dotnet pack CosmoBroker.Client/CosmoBroker.Client.csproj -c Release -o out
          dotnet pack CosmoBroker.Server/CosmoBroker.Server.csproj -c Release -o out

      - name: Push to NuGet
        run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # ── Job 2: Build and push Docker images to Docker Hub ────────────────────────
  publish-docker:
    name: Docker Hub
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6

      # Extract the semver tag (v1.1.5 → 1.1.5) for the image tag.
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build for both linux/amd64 and linux/arm64 in one push.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push broker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CosmoBroker.Server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-server:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-server:latest
          # Layer cache persisted across runs — speeds up repeated builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push management image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CosmoBroker.Management/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-management:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-management:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push combined broker-management image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/combined/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-server-management:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cosmobroker-server-management:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
